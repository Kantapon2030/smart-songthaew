<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Smart Songthaew — ติดตามการเดินทาง</title>
  <link rel="stylesheet" href="/css/style.css"/>
  <style>
    .tracking-shell {
      height: calc(100dvh - var(--nav-height));
      display: grid;
      grid-template-columns: minmax(0, 1fr) 390px;
      gap: 18px;
      padding: 18px;
    }

    .tracking-map-card {
      overflow: hidden;
      min-height: 520px;
    }

    #tracking-map {
      width: 100%;
      height: 100%;
    }

    .tracking-panel {
      overflow-y: auto;
    }

    .eta-card {
      margin-top: 16px;
      padding: 16px;
      color: #fff;
      background: var(--color-primary);
      border-radius: var(--radius-card);
    }

    .eta-card strong {
      display: block;
      font-size: 28px;
      line-height: 1.1;
      margin-top: 6px;
    }

    .timeline {
      position: relative;
      display: grid;
      gap: 0;
      margin-top: 14px;
      padding-left: 24px;
    }

    .timeline::before {
      content: "";
      position: absolute;
      left: 7px;
      top: 8px;
      bottom: 8px;
      width: 2px;
      background: var(--color-border);
    }

    .timeline-item {
      position: relative;
      padding: 0 0 16px;
    }

    .timeline-item::before {
      content: "";
      position: absolute;
      left: -22px;
      top: 3px;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: 3px solid var(--color-border);
      background: #fff;
    }

    .timeline-item.done::before {
      background: var(--color-success);
      border-color: var(--color-success);
    }

    .timeline-item.current::before {
      background: var(--color-primary);
      border-color: var(--color-primary);
    }

    @media (max-width: 980px) {
      .tracking-shell {
        height: auto;
        grid-template-columns: 1fr;
      }

      .tracking-map-card {
        height: 55dvh;
      }
    }
  </style>
</head>
<body data-page="tracking">
  <div id="navbar-root"></div>
  <main class="tracking-shell">
    <section class="tracking-map-card card">
      <div id="tracking-map" class="map-canvas"></div>
    </section>

    <aside class="tracking-panel card">
      <div class="card-header">
        <div>
          <h1 class="card-title">บริการกำลังให้บริการ • Live</h1>
          <div class="card-subtitle" id="tracking-updated">อัปเดต —</div>
        </div>
        <span class="status-badge status-online">กำลังเดินทาง</span>
      </div>
      <div class="card-body">
        <div>
          <div class="item-meta">เส้นทาง</div>
          <div id="tracking-route" class="item-title">—</div>
          <div id="tracking-plate" class="item-meta">—</div>
        </div>

        <div class="eta-card">
          <span>ใกล้ถึงคุณ</span>
          <strong id="tracking-eta">—</strong>
          <div id="tracking-distance">—</div>
        </div>

        <div style="margin-top:16px;">
          <div style="display:flex;justify-content:space-between;gap:10px;margin-bottom:8px;">
            <span class="metric-label">ความคืบหน้าการเดินทาง</span>
            <strong id="tracking-progress-label">0%</strong>
          </div>
          <div class="progress-track"><div id="tracking-progress" class="progress-fill"></div></div>
        </div>

        <div class="metric-grid" style="grid-template-columns:1fr 1fr;margin-top:16px;">
          <div class="metric-card" style="box-shadow:none;">
            <div class="metric-label">จุดจอดถัดไป</div>
            <div id="tracking-next-stop" class="metric-value" style="font-size:18px;">—</div>
          </div>
          <div class="metric-card" style="box-shadow:none;">
            <div class="metric-label">ที่นั่ง</div>
            <div id="tracking-seats" class="metric-value" style="font-size:18px;">—</div>
          </div>
        </div>

        <h2 class="card-title" style="margin-top:22px;">ไทม์ไลน์การเดินทาง</h2>
        <div id="tracking-timeline" class="timeline"></div>

        <div style="display:grid;gap:10px;margin-top:10px;">
          <label class="toggle-row">
            <span class="item-title">แจ้งเตือนเมื่อรถใกล้ถึง</span>
            <span class="switch"><input type="checkbox" checked/><span></span></span>
          </label>
          <label class="toggle-row">
            <span class="item-title">ติดตามคันนี้</span>
            <span class="switch"><input type="checkbox" checked/><span></span></span>
          </label>
        </div>
      </div>
    </aside>
  </main>

  <script src="/js/shared.js"></script>
  <script src="/js/tracking.js"></script>
</body>
</html>
