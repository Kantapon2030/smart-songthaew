<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Smart Songthaew — Dashboard</title>
  <link rel="stylesheet" href="/css/style.css"/>
  <style>
    .dashboard-layout {
      display: grid;
      gap: 10px;
    }

    .mesh-status-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
    }

    .mesh-status-card {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 8px;
      align-items: center;
      padding: 10px 12px;
      background: #fff;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-card);
      box-shadow: var(--shadow-card);
    }

    .mesh-status-icon {
      width: 32px;
      height: 32px;
      display: grid;
      place-items: center;
      border-radius: 9px;
      font-weight: 850;
    }

    .mesh-status-icon.green { color: var(--color-success); background: var(--color-success-50); }
    .mesh-status-icon.blue { color: var(--color-primary); background: var(--color-primary-50); }
    .mesh-status-icon.amber { color: var(--color-warning); background: var(--color-warning-50); }
    .mesh-status-icon.purple { color: #7c3aed; background: #f5f3ff; }

    .mesh-workspace {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 300px;
      gap: 10px;
      align-items: stretch;
    }

    .mesh-canvas-wrap {
      min-height: 380px;
      padding: 10px;
    }

    #mesh-graph-canvas {
      width: 100%;
      height: 260px;
      display: block;
      background: #fff;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-card);
    }

    .mesh-side-panel {
      min-height: 100%;
    }

    .health-ring {
      --value: 0;
      width: 48px;
      height: 48px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: conic-gradient(#7c3aed calc(var(--value) * 1%), var(--color-soft) 0);
      color: #5b21b6;
      font-size: 12px;
      font-weight: 850;
    }

    .distance-pill {
      display: inline-flex;
      min-width: 66px;
      justify-content: center;
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 800;
    }

    .distance-pill.green { color: var(--color-success); background: var(--color-success-50); }
    .distance-pill.blue { color: var(--color-primary); background: var(--color-primary-50); }
    .distance-pill.amber { color: var(--color-warning); background: var(--color-warning-50); }
    .distance-pill.gray { color: var(--color-offline); background: #f3f4f6; }

    .mesh-table-footer {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      padding: 12px 18px;
      border-top: 1px solid var(--color-border);
    }

    @media (max-width: 1120px) {
      .mesh-status-grid,
      .mesh-workspace {
        grid-template-columns: 1fr 1fr;
      }

      .mesh-side-panel {
        grid-column: 1 / -1;
      }
    }

    @media (max-width: 720px) {
      .mesh-status-grid,
      .mesh-workspace {
        grid-template-columns: 1fr;
      }

      .mesh-canvas-wrap {
        min-height: 380px;
      }

      #mesh-graph-canvas {
        height: 360px;
      }
    }
  </style>
</head>
<body data-page="dashboard">
  <div id="navbar-root"></div>
  <main class="page-shell dashboard-layout">
    <section class="mesh-status-grid" aria-label="Mesh Network Status">
      <div class="mesh-status-card">
        <div class="mesh-status-icon green" id="mesh-online-icon"></div>
        <div>
          <div class="metric-label">รถออนไลน์</div>
          <div id="mesh-online" class="metric-value">—</div>
          <div id="mesh-online-sub" class="metric-sub">—</div>
        </div>
      </div>
      <div class="mesh-status-card">
        <div class="mesh-status-icon blue" id="mesh-direct-icon"></div>
        <div>
          <div class="metric-label">Direct Links</div>
          <div id="mesh-direct-links" class="metric-value">—</div>
          <div id="mesh-direct-sub" class="metric-sub">เชื่อมต่อสถานีฐานโดยตรง</div>
        </div>
      </div>
      <div class="mesh-status-card">
        <div class="mesh-status-icon amber" id="mesh-relay-icon"></div>
        <div>
          <div class="metric-label">Relay Links</div>
          <div id="mesh-relay-links" class="metric-value">—</div>
          <div id="mesh-relay-sub" class="metric-sub">เชื่อมต่อผ่านรถคันอื่น</div>
        </div>
      </div>
      <div class="mesh-status-card">
        <div class="health-ring" id="mesh-health-ring">0</div>
        <div>
          <div class="metric-label">Mesh Health</div>
          <div id="mesh-health" class="metric-value">—</div>
          <div id="mesh-updated" class="metric-sub">อัปเดต —</div>
        </div>
      </div>
    </section>

    <section class="mesh-workspace">
      <div class="card">
        <div class="card-header">
          <div>
            <h1 class="card-title">Mesh Network</h1>
            <div class="card-subtitle">Green direct, orange/red relay, gray offline</div>
          </div>
          <button id="mesh-refresh-btn" class="button ghost" type="button">รีเฟรช</button>
        </div>
        <div class="mesh-canvas-wrap">
          <canvas id="mesh-graph-canvas" width="1100" height="560"></canvas>
        </div>
      </div>

      <aside class="card mesh-side-panel">
        <div class="card-header">
          <h2 class="card-title">ระยะห่างระหว่างรถ</h2>
        </div>
        <div class="table-wrap">
          <table class="data-table">
            <thead>
              <tr>
                <th>จาก</th>
                <th>ถึง</th>
                <th>ระยะ</th>
                <th>สถานะ</th>
              </tr>
            </thead>
            <tbody id="vehicle-distance-body"></tbody>
          </table>
        </div>
      </aside>
    </section>

    <section class="card">
      <div class="card-header">
        <h2 class="card-title">Connectivity Table</h2>
        <div>
          <button id="mesh-prev-page" class="button ghost" type="button">ก่อนหน้า</button>
          <button id="mesh-next-page" class="button ghost" type="button">ถัดไป</button>
        </div>
      </div>
      <div class="table-wrap">
        <table class="data-table">
          <thead>
            <tr>
              <th>#</th>
              <th>Vehicle</th>
              <th>เชื่อมกับ</th>
              <th>ระยะ</th>
              <th>Hop</th>
              <th>Link Type</th>
              <th>สถานะ</th>
              <th>Last seen</th>
            </tr>
          </thead>
          <tbody id="mesh-links-body"></tbody>
        </table>
      </div>
      <div class="mesh-table-footer">
        <span id="mesh-page-label" class="metric-sub">—</span>
      </div>
    </section>
  </main>

  <script src="/js/shared.js"></script>
  <script src="/js/meshDashboard.js"></script>
</body>
</html>
