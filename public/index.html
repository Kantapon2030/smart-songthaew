<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Smart Songthaew — หน้าหลัก</title>
  <meta name="description" content="ติดตามรถสองแถวแบบเรียลไทม์ วางแผนเส้นทาง และดูเวลาเดินทาง"/>
  <link rel="stylesheet" href="/css/style.css"/>
  <style>
    html,
    body {
      height: 100%;
      overflow: hidden;
    }

    .passenger-page {
      height: 100%;
      background: var(--color-background);
    }

    #map {
      position: fixed;
      inset: 0;
      z-index: 1;
    }

    #navbar-root {
      position: relative;
      z-index: 700;
    }

    .journey-sidebar {
      position: fixed;
      z-index: 650;
      top: 84px;
      left: 24px;
      width: 380px;
      max-height: calc(100dvh - 108px);
      overflow-y: auto;
      padding: 18px;
      background: #fff;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-card);
      box-shadow: 0 18px 55px rgba(15, 23, 42, 0.16);
    }

    .journey-title {
      margin: 0 0 16px;
      font-size: 24px;
      line-height: 1.2;
      font-weight: 850;
      letter-spacing: 0;
    }

    .route-control-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
      margin-bottom: 12px;
    }

    .direction-row,
    .search-row,
    .popular-grid,
    .recommended-list {
      margin-top: 12px;
    }

    .popular-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .destination-button {
      min-height: 58px;
      justify-content: flex-start;
      text-align: left;
      padding: 10px;
      background: var(--color-background);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-control);
      color: var(--color-ink);
      font-weight: 750;
    }

    .destination-button.active {
      border-color: var(--color-primary);
      background: var(--color-primary-50);
      color: var(--color-primary);
    }

    .section-label {
      margin: 18px 0 8px;
      font-size: 13px;
      color: var(--color-muted);
      font-weight: 800;
    }

    .recommended-item {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      padding: 12px;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-card);
      background: #fff;
    }

    .recommended-name {
      font-weight: 800;
    }

    .recommended-meta {
      margin-top: 3px;
      color: var(--color-muted);
      font-size: 12px;
    }

    .vehicle-card {
      position: fixed;
      right: 24px;
      bottom: 24px;
      z-index: 650;
      width: 360px;
      display: none;
      overflow: hidden;
    }

    .vehicle-card.show {
      display: block;
    }

    .vehicle-hero {
      display: grid;
      grid-template-columns: 74px 1fr;
      gap: 12px;
      align-items: center;
    }

    .vehicle-image {
      width: 74px;
      height: 58px;
      border-radius: var(--radius-control);
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--color-primary-50), #fff);
      border: 1px solid var(--color-primary-100);
      color: var(--color-primary);
    }

    .vehicle-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 14px;
    }

    .vehicle-stat {
      padding: 10px 8px;
      text-align: center;
      background: var(--color-background);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-control);
    }

    .vehicle-stat strong {
      display: block;
      font-size: 17px;
      line-height: 1;
    }

    .vehicle-stat span {
      display: block;
      margin-top: 5px;
      color: var(--color-muted);
      font-size: 11px;
      font-weight: 700;
    }

    .next-stop {
      margin-top: 14px;
      padding: 12px;
      background: var(--color-primary-50);
      border: 1px solid var(--color-primary-100);
      border-radius: var(--radius-control);
    }

    #mesh-toggle-wrap {
      position: fixed;
      right: 24px;
      bottom: 410px;
      z-index: 620;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      background: rgba(255, 255, 255, 0.94);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-control);
      box-shadow: var(--shadow-card);
      color: var(--color-muted);
      font-size: 12px;
      font-weight: 800;
    }

    #no-vehicles-notice {
      position: fixed;
      top: 84px;
      left: 50%;
      z-index: 640;
      display: none;
      transform: translateX(-50%);
      padding: 8px 12px;
      background: #fff;
      border: 1px solid var(--color-border);
      border-radius: 999px;
      box-shadow: var(--shadow-card);
      color: var(--color-muted);
      font-size: 13px;
      font-weight: 750;
    }

    @media (max-width: 860px) {
      .journey-sidebar {
        top: auto;
        left: 12px;
        right: 12px;
        bottom: 12px;
        width: auto;
        max-height: 52dvh;
      }

      .vehicle-card {
        right: 12px;
        left: 12px;
        bottom: calc(52dvh + 24px);
        width: auto;
      }

      #mesh-toggle-wrap {
        right: 12px;
        bottom: calc(52dvh + 210px);
      }
    }

    @media (max-width: 560px) {
      .popular-grid,
      .vehicle-stats {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body class="passenger-page" data-page="home">
  <div id="map" class="map-canvas"></div>
  <div id="navbar-root"></div>
  <div id="no-vehicles-notice">ยังไม่มีรถออนไลน์ในเส้นทางนี้</div>

  <aside class="journey-sidebar" aria-label="วางแผนการเดินทาง">
    <h1 class="journey-title">วางแผนการเดินทาง</h1>
    <div class="route-control-row">
      <select id="route-select" class="select-control" aria-label="เลือกเส้นทาง"></select>
      <button id="swap-route-btn" class="button ghost" type="button">เปลี่ยนสาย</button>
    </div>

    <div class="direction-row segmented" role="group" aria-label="ทิศทาง">
      <button id="direction-outbound" class="active" type="button" data-direction="outbound">ขาไป</button>
      <button id="direction-inbound" type="button" data-direction="inbound">ขากลับ</button>
    </div>

    <div class="search-row">
      <input id="destination-search" class="search-control" type="search" placeholder="ค้นหาปลายทาง สถานที่ หรือสำคัญ"/>
    </div>

    <div class="section-label">ปลายทางยอดนิยม</div>
    <div id="popular-destinations" class="popular-grid"></div>

    <button id="show-route-btn" class="button primary" type="button" style="width:100%;margin-top:14px;">ดูเส้นทางและเวลาเดินทาง</button>

    <div class="section-label">จุดจอดแนะนำ</div>
    <div id="recommended-stops" class="recommended-list panel-list">
      <div class="empty-state">กำลังโหลดจุดจอด...</div>
    </div>
  </aside>

  <section id="vehicle-card" class="vehicle-card card" aria-live="polite">
    <div class="card-header">
      <div>
        <h2 class="card-title">รถที่ใกล้คุณที่สุด</h2>
        <div id="vehicle-updated" class="card-subtitle">อัปเดต —</div>
      </div>
      <span id="vehicle-status" class="status-badge status-offline">—</span>
    </div>
    <div class="card-body">
      <div class="vehicle-hero">
        <div class="vehicle-image" id="vehicle-image"></div>
        <div>
          <div id="vehicle-route" class="item-title">—</div>
          <div id="vehicle-plate" class="item-meta">—</div>
        </div>
      </div>
      <div class="vehicle-stats">
        <div class="vehicle-stat"><strong id="vehicle-eta">—</strong><span>ETA</span></div>
        <div class="vehicle-stat"><strong id="vehicle-distance">—</strong><span>ระยะทาง</span></div>
        <div class="vehicle-stat" id="vehicle-seat-stat"><strong id="vehicle-seats">—</strong><span>ที่นั่ง</span></div>
      </div>
      <div class="next-stop">
        <div class="item-meta">จุดจอดถัดไป</div>
        <div id="vehicle-next-stop" class="item-title">—</div>
      </div>
    </div>
  </section>

  <button id="mesh-toggle-wrap" type="button">
    <span id="mesh-toggle-icon" aria-hidden="true"></span>
    <span id="mesh-toggle-label">Mesh</span>
    <span id="mesh-mode-badge" class="small-badge status-warning" style="display:none;">waiting</span>
  </button>

  <script src="/js/shared.js"></script>
  <script src="/js/meshOverlay.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
