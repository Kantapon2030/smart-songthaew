<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Smart Songthaew — หน้าหลัก</title>
  <meta name="description" content="ติดตามรถสองแถวแบบเรียลไทม์ วางแผนเส้นทาง และดูเวลาเดินทาง"/>
  <link rel="stylesheet" href="/css/style.css"/>
  <style>
    html, body { height: 100%; overflow: hidden; }

    .passenger-page {
      height: 100%;
      background: var(--color-background);
    }

    /* ── Full-screen map ── */
    #map {
      position: fixed;
      inset: 0;
      z-index: 1;
    }

    #navbar-root {
      position: relative;
      z-index: 700;
    }

    /* ── Journey Sidebar (desktop) ── */
    .journey-sidebar {
      position: fixed;
      z-index: 650;
      top: calc(var(--nav-height) + 12px);
      left: 16px;
      width: 340px;
      max-width: 360px;
      max-height: calc(100dvh - var(--nav-height) - 28px);
      overflow-y: auto;
      padding: 14px 16px;
      background: rgba(255,255,255,0.97);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-card);
      box-shadow: 0 12px 40px rgba(15,23,42,0.14);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);

      /* Scrollbar styling */
      scrollbar-width: thin;
      scrollbar-color: var(--color-border) transparent;
    }
    .journey-sidebar::-webkit-scrollbar { width: 4px; }
    .journey-sidebar::-webkit-scrollbar-thumb { background: var(--color-border); border-radius: 4px; }

    /* Drag handle for mobile */
    .sidebar-handle {
      display: none;
      width: 36px;
      height: 4px;
      background: var(--color-border);
      border-radius: 2px;
      margin: 0 auto 12px;
    }

    .journey-title {
      margin: 0 0 12px;
      font-size: 16px;
      line-height: 1.3;
      font-weight: 850;
    }

    .route-control-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
      margin-bottom: 10px;
    }

    .direction-row,
    .search-row,
    .popular-grid,
    .recommended-list {
      margin-top: 10px;
    }

    .popular-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 7px;
    }

    .destination-button {
      min-height: 52px;
      justify-content: flex-start;
      text-align: left;
      padding: 8px 10px;
      background: var(--color-background);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-control);
      color: var(--color-ink);
      font-weight: 700;
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 7px;
      cursor: pointer;
      transition: border-color .15s, background .15s;
    }

    .destination-button:hover {
      border-color: var(--color-primary);
      background: var(--color-primary-50);
    }

    .destination-button.active {
      border-color: var(--color-primary);
      background: var(--color-primary-50);
      color: var(--color-primary);
    }

    .section-label {
      margin: 12px 0 6px;
      font-size: 11px;
      color: var(--color-muted);
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .05em;
    }

    .recommended-item {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      padding: 10px 11px;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-control);
      background: #fff;
      cursor: pointer;
      transition: border-color .15s;
      width: 100%;
      text-align: left;
    }

    .recommended-item:hover { border-color: var(--color-primary); }

    .recommended-name { font-weight: 800; font-size: 13px; }
    .recommended-meta { margin-top: 2px; color: var(--color-muted); font-size: 11px; }

    /* ── Vehicle card (bottom-right desktop) ── */
    .vehicle-card {
      position: fixed;
      right: 16px;
      bottom: 16px;
      z-index: 650;
      width: 340px;
      max-width: 360px;
      display: none;
      overflow: hidden;
    }

    .vehicle-card.show { display: block; }

    .vehicle-hero {
      display: grid;
      grid-template-columns: 68px 1fr;
      gap: 10px;
      align-items: center;
    }

    .vehicle-image {
      width: 68px;
      height: 52px;
      border-radius: var(--radius-control);
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--color-primary-50), #fff);
      border: 1px solid var(--color-primary-100);
      color: var(--color-primary);
    }

    .vehicle-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 7px;
      margin-top: 12px;
    }

    .vehicle-stat {
      padding: 8px 6px;
      text-align: center;
      background: var(--color-background);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-control);
    }

    .vehicle-stat strong { display: block; font-size: 15px; line-height: 1; }
    .vehicle-stat span   { display: block; margin-top: 4px; color: var(--color-muted); font-size: 10px; font-weight: 700; }

    .next-stop {
      margin-top: 12px;
      padding: 10px 12px;
      background: var(--color-primary-50);
      border: 1px solid var(--color-primary-100);
      border-radius: var(--radius-control);
    }

    /* ── Mesh toggle ── */
    #mesh-toggle-wrap {
      position: fixed;
      right: 16px;
      bottom: 340px;
      z-index: 620;
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 7px 10px;
      background: rgba(255,255,255,0.95);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-control);
      box-shadow: var(--shadow-card);
      color: var(--color-muted);
      font-size: 12px;
      font-weight: 800;
      backdrop-filter: blur(8px);
    }

    /* ── No vehicles notice ── */
    #no-vehicles-notice {
      position: fixed;
      top: calc(var(--nav-height) + 12px);
      left: 50%;
      z-index: 640;
      display: none;
      transform: translateX(-50%);
      padding: 7px 14px;
      background: #fff;
      border: 1px solid var(--color-border);
      border-radius: 999px;
      box-shadow: var(--shadow-card);
      color: var(--color-muted);
      font-size: 13px;
      font-weight: 700;
      white-space: nowrap;
    }

    /* ────────────────────────────────────
       Tablet / Mobile Responsive
    ──────────────────────────────────── */
    @media (max-width: 860px) {
      /* Sidebar becomes bottom sheet */
      .journey-sidebar {
        position: fixed;
        top: auto;
        left: 0;
        right: 0;
        bottom: 0;
        width: 100%;
        max-width: 100%;
        max-height: 45dvh;
        border-radius: 16px 16px 0 0;
        border-bottom: none;
        padding: 8px 16px 16px;
      }

      .sidebar-handle { display: block; }

      .vehicle-card {
        right: 8px;
        left: 8px;
        bottom: calc(45dvh + 12px);
        width: auto;
        max-width: 100%;
      }

      #mesh-toggle-wrap {
        right: 8px;
        bottom: calc(45dvh + 210px);
      }

      .popular-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 480px) {
      .popular-grid,
      .vehicle-stats {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body class="passenger-page" data-page="home">
  <!-- Full-screen map -->
  <div id="map" class="map-canvas"></div>

  <!-- Navbar -->
  <div id="navbar-root"></div>

  <!-- No vehicles notice -->
  <div id="no-vehicles-notice" aria-live="polite">ยังไม่มีรถออนไลน์ในเส้นทางนี้</div>

  <!-- Journey Planner Sidebar -->
  <aside class="journey-sidebar" aria-label="วางแผนการเดินทาง">
    <div class="sidebar-handle" aria-hidden="true"></div>

    <h1 class="journey-title">วางแผนการเดินทาง</h1>

    <div class="route-control-row">
      <select id="route-select" class="select-control" aria-label="เลือกเส้นทาง"></select>
      <button id="swap-route-btn" class="button ghost" type="button">เปลี่ยนสาย</button>
    </div>

    <div class="direction-row segmented" role="group" aria-label="ทิศทาง">
      <button id="direction-outbound" class="active" type="button" data-direction="outbound">ขาไป</button>
      <button id="direction-inbound"  type="button" data-direction="inbound">ขากลับ</button>
    </div>

    <div class="search-row">
      <input id="destination-search" class="search-control" type="search"
        placeholder="ค้นหาปลายทาง หรือสถานที่"/>
    </div>

    <div class="section-label">ปลายทางยอดนิยม</div>
    <div id="popular-destinations" class="popular-grid"></div>

    <button id="show-route-btn" class="button primary" type="button"
      style="width:100%;margin-top:12px;">
      ดูเส้นทางและเวลาเดินทาง
    </button>

    <div class="section-label">จุดจอดแนะนำ</div>
    <div id="recommended-stops" class="recommended-list panel-list">
      <div class="empty-state">กำลังโหลดจุดจอด...</div>
    </div>
  </aside>

  <!-- Vehicle Info Card -->
  <section id="vehicle-card" class="vehicle-card card" aria-live="polite">
    <div class="card-header">
      <div>
        <h2 class="card-title">รถที่ใกล้คุณที่สุด</h2>
        <div id="vehicle-updated" class="card-subtitle">อัปเดต —</div>
      </div>
      <span id="vehicle-status" class="status-badge status-offline">—</span>
    </div>
    <div class="card-body">
      <div class="vehicle-hero">
        <div class="vehicle-image" id="vehicle-image"></div>
        <div>
          <div id="vehicle-route" class="item-title">—</div>
          <div id="vehicle-plate" class="item-meta" style="font-family:monospace;margin-top:4px;">—</div>
        </div>
      </div>
      <div class="vehicle-stats">
        <div class="vehicle-stat"><strong id="vehicle-eta">—</strong><span>ETA</span></div>
        <div class="vehicle-stat"><strong id="vehicle-distance">—</strong><span>ระยะทาง</span></div>
        <div class="vehicle-stat" id="vehicle-seat-stat"><strong id="vehicle-seats">—</strong><span>ที่นั่ง</span></div>
      </div>
      <div class="next-stop">
        <div class="item-meta">จุดจอดถัดไป</div>
        <div id="vehicle-next-stop" class="item-title">—</div>
      </div>
    </div>
  </section>

  <!-- Mesh toggle -->
  <button id="mesh-toggle-wrap" type="button">
    <span id="mesh-toggle-icon" aria-hidden="true"></span>
    <span id="mesh-toggle-label">Mesh</span>
    <span id="mesh-mode-badge" class="small-badge status-warning" style="display:none;">waiting</span>
  </button>

  <script src="/js/shared.js"></script>
  <script src="/js/meshOverlay.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
